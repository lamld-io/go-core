# ========================================
# Gateway Route Configuration (Docker)
# ========================================
# Trong Docker Compose, services giao tiếp qua service name (DNS nội bộ).
# Ví dụ: auth-service → http://auth-service:8081

routes:
  # Auth Service — public endpoints (register, login, refresh, validate)
  - prefix: /api/v1/auth
    target: http://auth-service:8081
    strip_prefix: false
    requires_auth: false

  # Thêm route mới cho các service khác ở đây.
  # Ví dụ:
  # - prefix: /api/v1/products
  #   target: http://product-service:8082
  #   strip_prefix: false
  #   requires_auth: true
  #   methods: [GET, POST, PUT, DELETE]
